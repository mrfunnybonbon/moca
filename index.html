<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigma Paint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app app-theme-light">
    <header class="app-header" aria-label="Application header">
      <div class="app-logo" aria-label="Application name">Sigma Paint</div>
      <div class="app-header-center">
        <div class="app-workspace-presets" aria-label="Workspace presets">
          <button class="chip" data-workspace="default">Default</button>
          <button class="chip" data-workspace="illustration">Illustration</button>
          <button class="chip" data-workspace="minimal">Minimal</button>
        </div>
      </div>
      <div class="app-header-controls">
        <div class="header-select-group">
          <label for="languageSelect" data-i18n="label.language">Language</label>
          <select id="languageSelect" aria-label="Language selector">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
          </select>
        </div>
        <div class="header-select-group">
          <label for="themeSelect" data-i18n="label.theme">Theme</label>
          <select id="themeSelect" aria-label="Theme selector">
            <option value="light" data-i18n="theme.light">Light</option>
            <option value="dark" data-i18n="theme.dark">Dark</option>
            <option value="midnight" data-i18n="theme.midnight">Midnight</option>
            <option value="high-contrast" data-i18n="theme.highContrast">High Contrast</option>
          </select>
        </div>
        <div class="header-select-group">
          <label for="uiScaleRange" data-i18n="label.uiScale">UI Scale</label>
          <input id="uiScaleRange" type="range" min="0.8" max="1.4" step="0.05" value="1">
        </div>
      </div>
    </header>

    <div class="app-main" role="main">
      <nav class="toolbar" aria-label="Tools toolbar">
        <div class="toolbar-group" data-i18n-title="group.brushes">
          <button class="tool-button active" data-tool="pencil" aria-pressed="true" aria-label="Pencil" data-i18n-title="tool.pencil">
            <span class="tool-icon">✏️</span>
          </button>
          <button class="tool-button" data-tool="brush" aria-label="Brush" data-i18n-title="tool.brush">
            <span class="tool-icon">🖌️</span>
          </button>
          <button class="tool-button" data-tool="spray" aria-label="Spray" data-i18n-title="tool.spray">
            <span class="tool-icon">🌀</span>
          </button>
          <button class="tool-button" data-tool="eraser" aria-label="Eraser" data-i18n-title="tool.eraser">
            <span class="tool-icon">🩹</span>
          </button>
        </div>
        <div class="toolbar-group" data-i18n-title="group.shapes">
          <button class="tool-button" data-tool="line" aria-label="Line" data-i18n-title="tool.line">
            <span class="tool-icon">／</span>
          </button>
          <button class="tool-button" data-tool="rectangle" aria-label="Rectangle" data-i18n-title="tool.rectangle">
            <span class="tool-icon">▭</span>
          </button>
          <button class="tool-button" data-tool="ellipse" aria-label="Ellipse" data-i18n-title="tool.ellipse">
            <span class="tool-icon">◯</span>
          </button>
          <button class="tool-button" data-tool="polygon" aria-label="Polygon" data-i18n-title="tool.polygon">
            <span class="tool-icon">⬠</span>
          </button>
        </div>
        <div class="toolbar-group" data-i18n-title="group.selection">
          <button class="tool-button" data-tool="select-rect" aria-label="Rectangle selection" data-i18n-title="tool.selectRect">
            <span class="tool-icon">▢</span>
          </button>
          <button class="tool-button" data-tool="select-free" aria-label="Freeform selection" data-i18n-title="tool.selectFree">
            <span class="tool-icon">✂️</span>
          </button>
          <button class="tool-button" data-tool="crop" aria-label="Crop" data-i18n-title="tool.crop">
            <span class="tool-icon">✂</span>
          </button>
          <button class="tool-button" data-tool="pan" aria-label="Pan" data-i18n-title="tool.pan">
            <span class="tool-icon">✥</span>
          </button>
        </div>
        <div class="toolbar-group" data-i18n-title="group.colorText">
          <button class="tool-button" data-tool="bucket" aria-label="Fill bucket" data-i18n-title="tool.bucket">
            <span class="tool-icon">🪣</span>
          </button>
          <button class="tool-button" data-tool="eyedropper" aria-label="Color picker" data-i18n-title="tool.eyedropper">
            <span class="tool-icon">🎯</span>
          </button>
          <button class="tool-button" data-tool="text" aria-label="Text" data-i18n-title="tool.text">
            <span class="tool-icon">T</span>
          </button>
        </div>
      </nav>

      <section class="canvas-workspace" aria-label="Canvas workspace">
        <div class="ruler ruler-horizontal"></div>
        <div class="ruler ruler-vertical"></div>
        <div class="canvas-container" id="canvasContainer">
          <canvas id="drawingCanvas" aria-label="Drawing canvas"></canvas>
          <div class="canvas-overlay canvas-grid" id="canvasGrid"></div>
          <div class="canvas-overlay canvas-selection" id="canvasSelection"></div>
          <div class="canvas-overlay canvas-guides" id="canvasGuides"></div>
        </div>
        <div class="canvas-controls">
          <button data-action="zoom-out" aria-label="Zoom out">−</button>
          <span id="zoomLabel">100%</span>
          <button data-action="zoom-in" aria-label="Zoom in">+</button>
          <button data-action="zoom-reset" aria-label="Reset zoom" data-i18n="button.resetView">Reset</button>
          <button data-action="toggle-grid" aria-label="Toggle grid" data-i18n="button.grid">Grid</button>
          <button data-action="toggle-rulers" aria-label="Toggle rulers" data-i18n="button.rulers">Rulers</button>
        </div>
      </section>

      <aside class="side-panels">
        <div class="panel panel-floating" id="colorPanel" data-panel="color" aria-label="Color panel">
          <div class="panel-header">
            <span data-i18n="panel.colors">Colors</span>
            <div class="panel-header-actions">
              <button class="panel-pin" data-action="toggle-dock" aria-label="Dock or undock panel">⤢</button>
              <button class="panel-collapse" data-action="toggle-collapse" aria-label="Collapse panel">⌃</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="color-picker-main">
              <input id="colorPrimary" type="color" value="#1f6feb" aria-label="Primary color">
              <input id="colorSecondary" type="color" value="#ffffff" aria-label="Secondary color">
            </div>
            <div class="color-sliders">
              <label>
                <span data-i18n="label.opacity">Opacity</span>
                <input id="opacityRange" type="range" min="0" max="1" step="0.01" value="1">
              </label>
              <label>
                <span data-i18n="label.brushSize">Brush size</span>
                <input id="brushSizeRange" type="range" min="1" max="128" step="1" value="6">
              </label>
            </div>
            <div class="color-palettes">
              <div class="palette-header">
                <span data-i18n="label.palette">Palette</span>
                <button id="addPaletteColor" data-i18n="button.add" aria-label="Add color to palette">Add</button>
              </div>
              <div class="palette-grid" id="paletteGrid"></div>
            </div>
            <div class="recent-colors">
              <div class="palette-header">
                <span data-i18n="label.recentColors">Recent</span>
              </div>
              <div class="palette-grid" id="recentColorsGrid"></div>
            </div>
          </div>
        </div>

        <div class="panel panel-floating" id="layersPanel" data-panel="layers" aria-label="Layers panel">
          <div class="panel-header">
            <span data-i18n="panel.layers">Layers</span>
            <div class="panel-header-actions">
              <button class="panel-pin" data-action="toggle-dock" aria-label="Dock or undock panel">⤢</button>
              <button class="panel-collapse" data-action="toggle-collapse" aria-label="Collapse panel">⌃</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="layers-toolbar">
              <button data-action="layer-add" data-i18n="button.addLayer">Add</button>
              <button data-action="layer-duplicate" data-i18n="button.duplicateLayer">Duplicate</button>
              <button data-action="layer-delete" data-i18n="button.deleteLayer">Delete</button>
              <button data-action="layer-merge" data-i18n="button.mergeLayer">Merge</button>
            </div>
            <ul id="layersList" class="layers-list" role="listbox" aria-label="Layers list"></ul>
            <div class="layer-properties">
              <label>
                <span data-i18n="label.layerOpacity">Opacity</span>
                <input id="layerOpacityRange" type="range" min="0" max="1" step="0.01" value="1">
              </label>
              <label>
                <span data-i18n="label.blendMode">Blend mode</span>
                <select id="blendModeSelect">
                  <option value="normal">Normal</option>
                  <option value="multiply">Multiply</option>
                  <option value="screen">Screen</option>
                  <option value="overlay">Overlay</option>
                  <option value="darken">Darken</option>
                  <option value="lighten">Lighten</option>
                  <option value="color-dodge">Color Dodge</option>
                  <option value="color-burn">Color Burn</option>
                  <option value="soft-light">Soft Light</option>
                  <option value="hard-light">Hard Light</option>
                </select>
              </label>
              <label>
                <span data-i18n="label.layerEffects">Effects</span>
                <select id="layerEffectsSelect">
                  <option value="none" data-i18n="effect.none">None</option>
                  <option value="shadow" data-i18n="effect.shadow">Shadow</option>
                  <option value="glow" data-i18n="effect.glow">Glow</option>
                  <option value="outline" data-i18n="effect.outline">Outline</option>
                </select>
              </label>
            </div>
          </div>
        </div>

        <div class="panel panel-floating" id="textPanel" data-panel="text" aria-label="Text panel">
          <div class="panel-header">
            <span data-i18n="panel.text">Text</span>
            <div class="panel-header-actions">
              <button class="panel-pin" data-action="toggle-dock" aria-label="Dock or undock panel">⤢</button>
              <button class="panel-collapse" data-action="toggle-collapse" aria-label="Collapse panel">⌃</button>
            </div>
          </div>
          <div class="panel-body">
            <label>
              <span data-i18n="label.fontFamily">Font</span>
              <select id="fontFamilySelect">
                <option value="system-ui">System</option>
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier</option>
              </select>
            </label>
            <label>
              <span data-i18n="label.fontSize">Size</span>
              <input id="fontSizeInput" type="number" min="6" max="256" value="24">
            </label>
            <div class="text-style-row">
              <button id="toggleBold" data-style="bold" aria-pressed="false">B</button>
              <button id="toggleItalic" data-style="italic" aria-pressed="false">I</button>
              <button id="toggleUnderline" data-style="underline" aria-pressed="false">U</button>
            </div>
            <div class="text-style-row">
              <button data-align="left">⟸</button>
              <button data-align="center">⇔</button>
              <button data-align="right">⟹</button>
            </div>
            <label>
              <span data-i18n="label.textEffects">Text effects</span>
              <select id="textEffectsSelect">
                <option value="none" data-i18n="effect.none">None</option>
                <option value="shadow" data-i18n="effect.shadow">Shadow</option>
                <option value="outline" data-i18n="effect.outline">Outline</option>
              </select>
            </label>
          </div>
        </div>

        <div class="panel panel-floating" id="settingsPanel" data-panel="settings" aria-label="Settings panel">
          <div class="panel-header">
            <span data-i18n="panel.settings">Settings</span>
            <div class="panel-header-actions">
              <button class="panel-pin" data-action="toggle-dock" aria-label="Dock or undock panel">⤢</button>
              <button class="panel-collapse" data-action="toggle-collapse" aria-label="Collapse panel">⌃</button>
            </div>
          </div>
          <div class="panel-body">
            <fieldset>
              <legend data-i18n="settings.autosave">Autosave</legend>
              <label>
                <input id="autosaveToggle" type="checkbox" checked>
                <span data-i18n="settings.autosaveEnable">Enable autosave</span>
              </label>
              <label>
                <span data-i18n="settings.autosaveInterval">Interval (seconds)</span>
                <input id="autosaveInterval" type="number" min="10" max="600" value="60">
              </label>
            </fieldset>
            <fieldset>
              <legend data-i18n="settings.grid">Grid</legend>
              <label>
                <span data-i18n="settings.gridSpacing">Grid spacing (px)</span>
                <input id="gridSpacingInput" type="number" min="4" max="512" value="32">
              </label>
            </fieldset>
            <fieldset>
              <legend data-i18n="settings.accessibility">Accessibility</legend>
              <label>
                <input id="highContrastToggle" type="checkbox">
                <span data-i18n="settings.highContrast">High contrast mode</span>
              </label>
              <label>
                <input id="screenReaderToggle" type="checkbox">
                <span data-i18n="settings.screenReader">Screen reader hints</span>
              </label>
            </fieldset>
          </div>
        </div>
      </aside>
    </div>

    <footer class="app-statusbar" aria-label="Status bar">
      <div class="status-left">
        <span id="statusTool" data-i18n="status.tool">Pencil</span>
        <span id="statusPosition">x: 0, y: 0</span>
      </div>
      <div class="status-center">
        <span id="statusHint"></span>
      </div>
      <div class="status-right">
        <span id="statusZoom">100%</span>
        <span id="statusColor"></span>
      </div>
    </footer>

    <div id="contextMenu" class="context-menu" role="menu" aria-hidden="true">
      <button data-action="context-cut" role="menuitem" data-i18n="menu.cut">Cut</button>
      <button data-action="context-copy" role="menuitem" data-i18n="menu.copy">Copy</button>
      <button data-action="context-paste" role="menuitem" data-i18n="menu.paste">Paste</button>
      <button data-action="context-duplicate-layer" role="menuitem" data-i18n="menu.duplicateLayer">Duplicate layer</button>
      <button data-action="context-delete-layer" role="menuitem" data-i18n="menu.deleteLayer">Delete layer</button>
    </div>

    <div id="notificationContainer" class="notification-container" aria-live="polite" aria-atomic="true"></div>

    <div class="floating-menu">
      <button id="fileMenuButton" class="primary" data-i18n="menu.file">File</button>
      <div id="fileMenuDropdown" class="floating-menu-dropdown" aria-label="File menu">
        <button data-action="file-new" data-i18n="menu.new">New</button>
        <button data-action="file-open" data-i18n="menu.open">Open</button>
        <button data-action="file-save" data-i18n="menu.save">Save</button>
        <button data-action="file-save-as" data-i18n="menu.saveAs">Save As</button>
        <button data-action="file-export-png" data-i18n="menu.exportPng">Export PNG</button>
        <button data-action="file-export-jpg" data-i18n="menu.exportJpg">Export JPG</button>
        <button data-action="file-export-svg" data-i18n="menu.exportSvg">Export SVG</button>
        <button data-action="file-export-pdf" data-i18n="menu.exportPdf">Export PDF</button>
        <button data-action="file-print" data-i18n="menu.print">Print</button>
        <button data-action="file-recents" data-i18n="menu.recentFiles">Recent files</button>
      </div>
      <button id="historyUndoButton" data-action="history-undo" aria-label="Undo" data-i18n-title="menu.undo">↶</button>
      <button id="historyRedoButton" data-action="history-redo" aria-label="Redo" data-i18n-title="menu.redo">↷</button>
    </div>

    <dialog id="printPreviewDialog" aria-label="Print preview">
      <div class="dialog-header">
        <h2 data-i18n="dialog.printPreviewTitle">Print preview</h2>
        <button data-action="dialog-close" aria-label="Close">✕</button>
      </div>
      <div class="dialog-body">
        <img id="printPreviewImage" alt="Print preview image">
      </div>
      <div class="dialog-footer">
        <button data-action="print-dialog" class="primary" data-i18n="button.print">Print</button>
      </div>
    </dialog>

    <dialog id="recentFilesDialog" aria-label="Recent files">
      <div class="dialog-header">
        <h2 data-i18n="dialog.recentsTitle">Recent files</h2>
        <button data-action="dialog-close" aria-label="Close">✕</button>
      </div>
      <div class="dialog-body">
        <ul id="recentFilesList" class="recent-files-list"></ul>
      </div>
      <div class="dialog-footer">
        <button data-action="clear-recents" data-i18n="button.clearRecent">Clear</button>
      </div>
    </dialog>

    <dialog id="genericDialog" aria-label="Dialog">
      <div class="dialog-header">
        <h2 id="genericDialogTitle"></h2>
        <button data-action="dialog-close" aria-label="Close">✕</button>
      </div>
      <div class="dialog-body" id="genericDialogBody"></div>
      <div class="dialog-footer" id="genericDialogFooter"></div>
    </dialog>
  </div>

  <noscript>
    <p>This application requires JavaScript to run.</p>
  </noscript>

  <script src="app.js" type="module"></script>
</body>
</html>
